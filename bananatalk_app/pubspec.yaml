name: bananatalk_app
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.3.8+10539


environment:
  sdk: '>=3.10.0 <4.0.0'  # ← UPDATE THIS LINE
  flutter: ">=3.24.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2

  http: ^1.1.0
  image_picker: ^1.0.8
  shared_preferences: ^2.2.3
  google_fonts: 6.1.0
  geolocator: ^11.1.0
  flutter_webrtc: ^1.2.0
  permission_handler: ^11.0.1

  geocoding: ^3.0.0

  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  flutter_lints: ^3.0.2
  retrofit: ^4.1.0
  flutter_riverpod: ^2.4.10
  intl: ^0.20.2
  timeago: ^3.6.1
  socket_io_client: ^2.0.3+1
  share_plus: ^12.0.1
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  url_launcher: ^6.2.2
  package_info_plus: ^8.0.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  image_cropper: ^12.2.1
  any_link_preview: ^3.0.2
  file_picker: ^8.0.0
  webview_flutter: ^4.4.2
  google_sign_in: ^6.1.6

  flutter_launcher_icons: ^0.13.1
  flutter_dotenv: ^6.0.0
  sign_in_with_apple: ^6.0.0
  in_app_purchase: ^3.1.11
  google_mobile_ads: ^5.3.0
  
  # Firebase & Notifications
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^16.3.0
  app_settings: ^5.1.1
  device_info_plus: ^10.1.0
  
  # Routing
  go_router: ^14.0.0

  # Swipe actions
  flutter_slidable: ^3.1.0

  # Video Support
  video_player: ^2.8.2
  chewie: ^1.7.4
  video_compress: ^3.1.2
  video_trimmer: ^5.0.0

  # Utilities
  uuid: ^4.3.3

  # Audio/Voice Recording
  flutter_sound: ^9.2.13
  audio_session: ^0.1.18
  path_provider: ^2.1.2
  just_audio: ^0.9.36

  # Incoming call UI (native CallKit on iOS, full-screen activity on Android)
  flutter_callkit_incoming: ^2.0.4+1

  # Network connectivity
  connectivity_plus: ^6.0.3
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

#  flutter_facebook_auth: ^7.0.1



dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  win32: ^5.5.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/sounds/
    - .env
flutter_launcher_icons:
  # iOS — full icon with yellow background
  ios: true
  image_path_ios: "assets/images/logo_with_background.png"
  remove_alpha_ios: true

  # Android — adaptive icon (separate foreground + background)
  android: true
  image_path_android: "assets/images/logo_with_background.png"
  adaptive_icon_foreground: "assets/images/logo_no_background.png"
  adaptive_icon_background: "#FFD93D"

  # Web favicon
  web:
    generate: false

  min_sdk_android: 24



